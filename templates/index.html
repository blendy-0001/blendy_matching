<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤝 協業マッチングシステム | Blendy Inc.</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #f5f5f0;
      color: #2d2d2d;
      min-height: 100vh;
    }
    header {
      background: #1a1a1a;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: 0.85rem; color: #999; }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

    /* 統計カード */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .stat-card .label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .stat-card .value {
      font-size: 2.6rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    .stat-card .unit { font-size: 1rem; font-weight: 400; color: #666; }

    /* 実行ボタンエリア */
    .action-area {
      background: white;
      border-radius: 16px;
      padding: 36px;
      margin-bottom: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
    }
    .action-area h2 { font-size: 1.1rem; margin-bottom: 8px; }
    .action-area p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

    .run-btn {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 16px 56px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .run-btn:hover { background: #333; transform: translateY(-1px); }
    .run-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .progress-bar {
      margin-top: 24px;
      display: none;
    }
    .progress-text {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 10px;
    }
    .bar-track {
      background: #eee;
      border-radius: 50px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1a1a1a, #555);
      border-radius: 50px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* 結果エリア */
    .results-area { display: none; }
    .results-area h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #1a1a1a;
    }

    .match-card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-left: 5px solid #1a1a1a;
    }
    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .match-names { font-size: 1.15rem; font-weight: 700; }
    .match-names .cross { color: #999; margin: 0 8px; }
    .match-meta { display: flex; gap: 10px; align-items: center; }
    .score-badge {
      background: #1a1a1a;
      color: white;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .type-badge {
      background: #f0f0f0;
      color: #555;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
    }

    .score-breakdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 10px;
    }
    .score-item { text-align: center; }
    .score-item .s-label { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
    .score-item .s-val { font-size: 1.2rem; font-weight: 700; }

    .reason {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 16px;
      padding: 14px 16px;
      background: #fffbe6;
      border-radius: 10px;
      border-left: 3px solid #f0c040;
    }

    .intro-section { margin-top: 16px; }
    .intro-label { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
    .intro-text {
      background: #f5f5f0;
      border-radius: 10px;
      padding: 16px;
      font-size: 0.88rem;
      line-height: 1.75;
      white-space: pre-wrap;
      color: #333;
    }
    .copy-btn {
      margin-top: 10px;
      background: none;
      border: 1px solid #ddd;
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: #f0f0f0; border-color: #bbb; }
    .copy-btn.copied { color: #2d8a4e; border-color: #2d8a4e; }

    /* 申込リンクバナー */
    .register-banner {
      background: white;
      border-radius: 16px;
      padding: 24px 32px;
      margin-bottom: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .register-banner .banner-text h3 { font-size: 1rem; margin-bottom: 4px; }
    .register-banner .banner-text p { font-size: 0.85rem; color: #888; }
    .register-link-btn {
      background: #1a1a1a;
      color: white;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .register-link-btn:hover { background: #333; transform: translateY(-1px); }

    /* Notionリンク */
    .notion-link {
      margin-top: 40px;
      text-align: center;
    }
    .notion-link a {
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .notion-link a:hover { color: #333; }
  </style>
</head>
<body>

<header>
  <h1>🤝 協業マッチングシステム</h1>
  <span>Blendy Inc.</span>
</header>

<div class="container">

  <!-- 申込フォームバナー -->
  <div class="register-banner">
    <div class="banner-text">
      <h3>📋 新規メンバー申込フォーム</h3>
      <p>このURLを参加者にシェアしてください。入力内容はNotionに自動で登録されます。</p>
    </div>
    <a href="/register" target="_blank" class="register-link-btn">フォームを開く →</a>
  </div>

  <!-- 統計カード -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">総登録者数</div>
      <div class="value" id="totalMembers">--<span class="unit"> 名</span></div>
    </div>
    <div class="stat-card">
      <div class="label">マッチング可能件数</div>
      <div class="value" id="availablePairs">--<span class="unit"> 組</span></div>
    </div>
    <div class="stat-card">
      <div class="label">今回のマッチング結果</div>
      <div class="value" id="thisTimeCount">--<span class="unit"> 組</span></div>
    </div>
    <div class="stat-card">
      <div class="label">累計マッチング済み</div>
      <div class="value" id="totalMatched">--<span class="unit"> 組</span></div>
    </div>
  </div>

  <!-- 実行ボタン -->
  <div class="action-area">
    <h2>AIマッチングを実行する</h2>
    <p>メンバーリストを読み込み、最適なペアをAIが自動で選定します</p>
    <button class="run-btn" id="runBtn" onclick="startMatching()">
      ▶ マッチング実行
    </button>
    <div class="progress-bar" id="progressBar">
      <div class="progress-text" id="progressText">準備中...</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
    </div>
  </div>

  <!-- 結果表示 -->
  <div class="results-area" id="resultsArea">
    <h2 id="resultsTitle">📋 マッチング結果</h2>
    <div id="resultsList"></div>
  </div>

  <div class="notion-link">
    <a href="https://www.notion.so/3682a89c5c9481d0b0d2f6504fe35b99" target="_blank">
      📝 Notionで詳細を確認する →
    </a>
  </div>

</div>

<script>
  // 初期統計を読み込む
  loadStats();

  async function loadStats() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();
      if (data.success) {
        const s = data.stats;
        document.getElementById('totalMembers').innerHTML =
          `${s['総登録者数']}<span class="unit"> 名</span>`;
        document.getElementById('availablePairs').innerHTML =
          `${s['マッチング可能件数']}<span class="unit"> 組</span>`;
        document.getElementById('totalMatched').innerHTML =
          `${s['累計マッチング済み']}<span class="unit"> 組</span>`;
      }
    } catch(e) { console.error(e); }
  }

  async function startMatching() {
    const btn = document.getElementById('runBtn');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    btn.disabled = true;
    progressBar.style.display = 'block';
    document.getElementById('resultsArea').style.display = 'none';
    document.getElementById('thisTimeCount').innerHTML = '--<span class="unit"> 組</span>';

    // マッチング開始リクエスト
    await fetch('/api/run-matching', { method: 'POST' });

    // 進捗をポーリング
    const poll = setInterval(async () => {
      const res = await fetch('/api/results');
      const data = await res.json();

      progressText.textContent = data.progress;

      if (!data.running) {
        clearInterval(poll);
        btn.disabled = false;

        if (data.results && data.results.length > 0) {
          showResults(data.results);
        } else {
          progressBar.style.display = 'none';
        }
        loadStats();
      }
    }, 2000);
  }

  function showResults(results) {
    const area = document.getElementById('resultsArea');
    const list = document.getElementById('resultsList');
    const title = document.getElementById('resultsTitle');

    title.textContent = `📋 今回のマッチング結果 （${results.length}組）`;
    document.getElementById('thisTimeCount').innerHTML =
      `${results.length}<span class="unit"> 組</span>`;

    list.innerHTML = results.map((m, i) => `
      <div class="match-card">
        <div class="match-header">
          <div class="match-names">
            ${m['メンバーA名']}<span class="cross">×</span>${m['メンバーB名']}
          </div>
          <div class="match-meta">
            <span class="score-badge">${m['スコア']}点</span>
            <span class="type-badge">${m['協業タイプ']}</span>
          </div>
        </div>

        <div class="reason">💡 ${m['マッチング理由']}</div>

        <div class="intro-section">
          <div class="intro-label">📨 紹介文（LINEグループ / Facebookグループにそのまま送信）</div>
          <div class="intro-text" id="intro-${i}">${m['紹介文']}</div>
          <button class="copy-btn" onclick="copyIntro(${i}, this)">
            コピーする
          </button>
        </div>
      </div>
    `).join('');

    area.style.display = 'block';
    document.getElementById('progressBar').style.display = 'none';
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyIntro(index, btn) {
    const text = document.getElementById(`intro-${index}`).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ コピーしました';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'コピーする';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
