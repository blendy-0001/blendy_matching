[pytest]
# pytest configuration for blendy_matching

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test paths
testpaths = tests

# アプリ本体は src/blendy/ パッケージ配下にあるため src を import パスに追加
pythonpath = src

# Markers
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for API interactions
    scoring: Tests for scoring logic
    matching: Tests for matching logic
    history: Tests for matching history
